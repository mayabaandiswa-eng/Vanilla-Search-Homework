<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Weather App</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="weather-app">
            <form id="search-form">
                <input type="text" id="city-input" placeholder="Enter a city..." required />
                <button type="submit">Search</button>
                </form>

                <div class="weather-info">
                    <div class="left">
                        <h1 id="city-name">Cape Town</h1>
                        <p id="date-time">Tuesday 19:13</p>
                        <p id="description">Clear Sky</p>
                        <p class="details">Humidity: <span id="Humidity">87</span>% | Wind: <span id="wind">4.63</span>km/h
                        </p>
                        </div>
                        <div class="right">
                            <img id="icon" src="" alt="Weather Icon" />
                            <h2><span id="temperature">14</span>&deg;C</h2>
                        </div>
                        </div>

                        <footer>This project was coded by <a href="#">Andiswa Mayaba,</a> is <a href="https://github.com/mayabaandiswa-eng/Vanilla-Search-Homework">open-source on GitHub</a> and <a href="https:app.netlify.com/teams/mayabaandiswa-eng/projects">hosted on Netlify</a>
                        </footer>
                        </div>

                        <script src="SRC/script.js"></script>
    </body>
</html>
